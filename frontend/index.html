<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOFEM MES — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#D42B2B;--bg:#0E0F11;--bg2:#14161A;--bg3:#1C1F25;--border:rgba(255,255,255,0.07);--text:#E8E9EB;--muted:#6B7280;--green:#22C55E}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(212,43,43,0.015) 40px,rgba(212,43,43,0.015) 80px);pointer-events:none}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:340px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}

.logo{text-align:center;margin-bottom:2rem}
.logo-icon{width:56px;height:56px;background:var(--red);border-radius:12px;margin:0 auto 0.75rem;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:28px;position:relative;overflow:hidden}
.logo-icon::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,0.05) 4px,rgba(255,255,255,0.05) 8px)}
.logo-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px}
.logo-sub{font-size:9px;letter-spacing:2px;color:var(--red);font-family:'IBM Plex Mono',monospace;text-transform:uppercase}

.pin-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:1.25rem}

.pin-dots{display:flex;justify-content:center;gap:0.75rem;margin-bottom:1.75rem}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all .2s}
.pin-dot.filled{background:var(--red);border-color:var(--red);transform:scale(1.1)}

.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem}
.key{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:0.9rem;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);cursor:pointer;text-align:center;transition:all .15s;user-select:none}
.key:hover{background:rgba(212,43,43,0.15);border-color:var(--red);color:#fff}
.key:active{transform:scale(0.94)}
.key.del{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--muted)}
.key.del:hover{color:var(--red)}
.key.empty{background:transparent;border:none;cursor:default}
.key.empty:hover{background:transparent;border:none}

.btn-login{width:100%;background:var(--red);color:#fff;border:none;padding:0.8rem;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:8px;margin-top:0.75rem;transition:all .15s;opacity:0.4}
.btn-login.ready{opacity:1}
.btn-login.ready:hover{background:#A01F1F}

.error{text-align:center;color:#F87171;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;margin-top:0.75rem;min-height:16px;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.footer-txt{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">S</div>
    <div class="logo-name">SOFEM</div>
    <div class="logo-sub">MES v2.0 · Manufacturing Execution System</div>
  </div>

  <div class="pin-label">Entrez votre code PIN</div>

  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>

  <div class="numpad">
    <div class="key" onclick="pressKey('1')">1</div>
    <div class="key" onclick="pressKey('2')">2</div>
    <div class="key" onclick="pressKey('3')">3</div>
    <div class="key" onclick="pressKey('4')">4</div>
    <div class="key" onclick="pressKey('5')">5</div>
    <div class="key" onclick="pressKey('6')">6</div>
    <div class="key" onclick="pressKey('7')">7</div>
    <div class="key" onclick="pressKey('8')">8</div>
    <div class="key" onclick="pressKey('9')">9</div>
    <div class="key empty"></div>
    <div class="key" onclick="pressKey('0')">0</div>
    <div class="key del" onclick="deleteKey()">⌫</div>
  </div>

  <button class="btn-login" id="btn-login" onclick="doLogin()">CONNEXION</button>
  <div class="error" id="error-msg"></div>
</div>

<div class="footer-txt">SMARTMOVE · Mahmoud Njeh · © 2025</div>

<script>
const API = window.location.origin;
let pin = '';

function pressKey(k) {
  if (pin.length >= 4) return;
  pin += k;
  updateDots();
  if (pin.length === 4) {
    document.getElementById('btn-login').classList.add('ready');
    setTimeout(doLogin, 300); // auto-submit on 4 digits
  }
}

function deleteKey() {
  pin = pin.slice(0, -1);
  updateDots();
  document.getElementById('btn-login').classList.remove('ready');
  document.getElementById('error-msg').textContent = '';
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById(`d${i}`);
    d.classList.toggle('filled', i < pin.length);
  }
}

async function doLogin() {
  if (pin.length !== 4) return;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('error-msg');
  btn.textContent = '...';
  try {
    const r = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({pin})
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'PIN incorrect');

    // Save token and user info
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', data.role);
    localStorage.setItem('nom', data.nom);
    localStorage.setItem('prenom', data.prenom);
    localStorage.setItem('operateur_id', data.operateur_id || '');

    // Small delay to ensure localStorage is written before redirect
    await new Promise(r => setTimeout(r, 100));

    // Redirect based on role
    if (data.role === 'ADMIN' || data.role === 'MANAGER') {
      window.location.replace('/admin');
    } else {
      window.location.replace('/operator');
    }
  } catch(e) {
    err.textContent = e.message;
    pin = '';
    updateDots();
    btn.textContent = 'CONNEXION';
    btn.classList.remove('ready');
    // shake animation reset
    err.style.animation = 'none';
    setTimeout(() => err.style.animation = '', 10);
  }
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') pressKey(e.key);
  if (e.key === 'Backspace') deleteKey();
  if (e.key === 'Enter' && pin.length === 4) doLogin();
});
</script>
</body>
</html>
